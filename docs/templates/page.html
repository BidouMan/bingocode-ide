<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}} - BingoCodeIDE 帮助文档</title>
  <style>
    :root {
      --bg-primary: #FFFFFF;
      --bg-secondary: #F5F5F7;
      --bg-sidebar: #FBFBFD;
      --bg-hover: #F0F0F2;
      --bg-active: #E8F5E9;
      --border: #E5E5EA;
      --border-light: #F2F2F7;
      --text-primary: #1D1D1F;
      --text-secondary: #6E6E73;
      --text-muted: #86868B;
      --accent: #34C759;
      --accent-dark: #248A3D;
      --accent-bg: rgba(52, 199, 89, 0.08);
      --code-bg: #F5F5F7;
      --code-border: #E5E5EA;
      --link: #0066CC;
      --link-hover: #0077ED;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
      --sidebar-width: 280px;
      --content-max-width: 860px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      display: flex;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── 侧边栏 ─── */
    .sidebar {
      width: var(--sidebar-width);
      min-height: 100vh;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow-y: auto;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar-nav { padding: 16px 12px; }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 12px 16px;
      margin-bottom: 8px;
    }

    .nav-brand-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .nav-brand-text { font-weight: 600; font-size: 14px; color: var(--text-primary); }
    .nav-brand-tag { font-size: 11px; color: var(--text-muted); }

    /* ─── 搜索框 ─── */
    .search-wrapper {
      padding: 0 12px 12px;
    }

    .search-box {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      transition: all 0.15s ease;
    }

    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      border-color: var(--accent);
      background: var(--bg-primary);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 16px;
      height: 16px;
    }

    .search-results {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-top: 4px;
      max-height: 300px;
      overflow-y: auto;
      box-shadow: var(--shadow-md);
      z-index: 1000;
    }

    .search-results.active { display: block; }

    .search-result-item {
      display: block;
      padding: 10px 12px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      border-bottom: 1px solid var(--border-light);
      transition: background 0.1s;
    }

    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--bg-hover); }

    .search-result-title {
      color: var(--text-primary);
      font-weight: 500;
      margin-bottom: 2px;
    }

    .search-result-excerpt {
      font-size: 12px;
      color: var(--text-muted);
    }

    .search-result-highlight {
      background: rgba(52, 199, 89, 0.2);
      padding: 0 2px;
      border-radius: 2px;
    }

    .search-no-result {
      padding: 16px 12px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .nav-section-title {
      padding: 8px 12px 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .nav-item {
      display: block;
      padding: 8px 12px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.15s ease;
      border-radius: var(--radius-sm);
      margin: 1px 0;
    }

    .nav-item:hover { color: var(--text-primary); background: var(--bg-hover); }
    .nav-item.active { color: var(--accent-dark); background: var(--accent-bg); font-weight: 500; }

    .nav-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 8px 12px;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: background 0.15s ease;
      border-radius: var(--radius-sm);
    }

    .nav-group-header:hover { background: var(--bg-hover); }

    .nav-arrow { transition: transform 0.2s ease; color: var(--text-muted); width: 12px; height: 12px; }
    .nav-group.expanded .nav-arrow { transform: rotate(90deg); }

    .nav-group-items { display: none; padding: 2px 0 2px 8px; }
    .nav-group.expanded .nav-group-items { display: block; }
    .nav-group-items .nav-item { padding-left: 16px; font-size: 13px; }

    .main { flex: 1; margin-left: var(--sidebar-width); min-height: 100vh; background: var(--bg-primary); }
    .content { max-width: var(--content-max-width); margin: 0 auto; padding: 48px 56px 100px; }

    h1 { font-size: 34px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; line-height: 1.2; letter-spacing: -0.5px; }
    h2 { font-size: 22px; font-weight: 600; color: var(--text-primary); margin-top: 48px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    h3 { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-top: 32px; margin-bottom: 12px; }
    h4 { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-top: 24px; margin-bottom: 8px; }

    p { margin-bottom: 16px; color: var(--text-secondary); line-height: 1.7; }
    a { color: var(--link); text-decoration: none; transition: color 0.15s ease; }
    a:hover { color: var(--link-hover); }
    strong { color: var(--text-primary); font-weight: 600; }

    ul, ol { margin-bottom: 16px; padding-left: 24px; color: var(--text-secondary); }
    li { margin-bottom: 8px; line-height: 1.6; }
    li::marker { color: var(--accent); }

    code { font-family: var(--font-mono); font-size: 0.88em; }
    :not(pre) > code { background: var(--code-bg); border: 1px solid var(--code-border); padding: 2px 6px; border-radius: 4px; color: #C41A16; font-size: 0.85em; }

    .code-block { margin: 16px 0 20px; border: 1px solid var(--code-border); border-radius: var(--radius-md); overflow: hidden; background: #FAFBFC; }
    .code-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: var(--bg-secondary); border-bottom: 1px solid var(--code-border); }
    .code-lang { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
    .copy-btn { background: var(--bg-primary); border: 1px solid var(--code-border); color: var(--text-muted); padding: 4px 10px; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s ease; }
    .copy-btn:hover { color: var(--text-primary); border-color: var(--text-muted); }
    .code-block pre { margin: 0; padding: 16px; overflow-x: auto; background: transparent; }
    .code-block pre code { background: none; border: none; padding: 0; color: var(--text-primary); font-size: 13px; line-height: 1.6; }

    table { width: 100%; border-collapse: collapse; margin: 16px 0 20px; font-size: 14px; }
    th, td { padding: 10px 14px; border: 1px solid var(--border); text-align: left; }
    th { background: var(--bg-secondary); font-weight: 600; color: var(--text-primary); }
    td { color: var(--text-secondary); }
    tr:hover td { background: var(--bg-secondary); }

    blockquote { margin: 16px 0; padding: 14px 18px; border-left: 4px solid var(--accent); background: var(--accent-bg); border-radius: 0 var(--radius-md) var(--radius-md) 0; }
    blockquote p { margin: 0; color: var(--text-primary); }

    .screenshot-placeholder { margin: 24px 0; text-align: center; }
    .screenshot-placeholder img { max-width: 100%; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-md); }
    .screenshot-desc { margin-top: 10px; font-size: 13px; color: var(--text-muted); }

    hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

    .mobile-menu-btn {
      display: none;
      position: fixed;
      top: 16px; left: 16px;
      z-index: 200;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 40px; height: 40px;
      border-radius: var(--radius-md);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
    }

    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 90; }

    @media (max-width: 768px) {
      .mobile-menu-btn { display: flex; }
      .sidebar { transform: translateX(-100%); box-shadow: var(--shadow-md); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { margin-left: 0; }
      .content { padding: 24px 20px 80px; }
      h1 { font-size: 28px; }
      h2 { font-size: 20px; }
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::selection { background: rgba(52, 199, 89, 0.2); color: var(--text-primary); }
  </style>
</head>
<body>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar">
    <div class="sidebar-nav">
      {{SIDEBAR}}
    </div>
  </aside>

  <main class="main">
    <div class="content">
      {{CONTENT}}
    </div>
  </main>

  <script>
    // ─── 搜索功能 ───
    const SEARCH_INDEX = {{SEARCH_INDEX}};

    // 计算当前页面深度，用于修正相对路径
    function getDepth() {
      const path = window.location.pathname;
      const parts = path.split('/').filter(p => p && p.endsWith('.html'));
      if (parts.length <= 1) return 0;
      return parts.length - 1;
    }

    function getPrefix() {
      const depth = getDepth();
      return depth > 0 ? '../'.repeat(depth) : './';
    }

    function fixPath(path) {
      // 如果路径已经是绝对路径或带有 ../ 前缀，直接返回
      if (path.startsWith('../') || path.startsWith('http')) return path;
      // 否则添加正确的前缀
      return getPrefix() + path.replace(/^\.\//, '');
    }

    function initSearch() {
      const searchInput = document.getElementById('search-input');
      const searchResults = document.getElementById('search-results');
      if (!searchInput || !searchResults) return;

      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim().toLowerCase();
        if (query.length < 2) {
          searchResults.classList.remove('active');
          return;
        }

        const results = SEARCH_INDEX.filter(item => {
          return item.title.toLowerCase().includes(query) ||
                 item.content.toLowerCase().includes(query);
        }).slice(0, 8);

        if (results.length === 0) {
          searchResults.innerHTML = '<div class="search-no-result">未找到相关内容</div>';
        } else {
          searchResults.innerHTML = results.map(item => {
            let excerpt = item.content.substring(0, 100);
            const idx = item.content.toLowerCase().indexOf(query);
            if (idx > 0) {
              excerpt = '...' + item.content.substring(Math.max(0, idx - 30), idx + 60) + '...';
            }
            excerpt = excerpt.replace(new RegExp(`(${escapeRegex(query)})`, 'gi'), '<span class="search-result-highlight">$1</span>');
            const title = item.title.replace(new RegExp(`(${escapeRegex(query)})`, 'gi'), '<span class="search-result-highlight">$1</span>');
            const href = fixPath(item.path);
            return `<a class="search-result-item" href="${href}">
              <div class="search-result-title">${title}</div>
              <div class="search-result-excerpt">${excerpt}</div>
            </a>`;
          }).join('');
        }
        searchResults.classList.add('active');
      });

      searchInput.addEventListener('blur', () => {
        setTimeout(() => searchResults.classList.remove('active'), 200);
      });
    }

    function escapeRegex(str) {
      return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // ─── 导航分组折叠 ───
    function toggleNavGroup(btn) {
      const group = btn.parentElement;
      group.classList.toggle('expanded');
      const state = JSON.parse(localStorage.getItem('navState') || '{}');
      const title = btn.querySelector('span').textContent;
      state[title] = group.classList.contains('expanded');
      localStorage.setItem('navState', JSON.stringify(state));
    }

    document.addEventListener('DOMContentLoaded', () => {
      const state = JSON.parse(localStorage.getItem('navState') || '{}');
      document.querySelectorAll('.nav-group').forEach(group => {
        const title = group.querySelector('.nav-group-header span')?.textContent;
        if (title && state[title] !== undefined) {
          group.classList.toggle('expanded', state[title]);
        }
      });
      initSearch();
    });

    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('open');
      document.querySelector('.sidebar-overlay').classList.toggle('open');
    }

    function copyCode(btn) {
      const code = btn.closest('.code-block').querySelector('code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = '已复制 ✓';
        btn.style.color = 'var(--accent)';
        setTimeout(() => { btn.textContent = '复制'; btn.style.color = ''; }, 2000);
      });
    }
  </script>
</body>
</html>
