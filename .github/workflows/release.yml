name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: '构建平台'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - macos
          - both

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: >-
          ${{
            github.event_name == 'workflow_dispatch' && (
              github.event.inputs.platform == 'windows' && fromJSON('["windows-latest"]') ||
              github.event.inputs.platform == 'macos' && fromJSON('["macos-latest"]') ||
              fromJSON('["macos-latest", "windows-latest"]')
            ) || fromJSON('["macos-latest", "windows-latest"]')
          }}

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: pnpm install

      - name: Setup portable Python engine
        shell: bash
        run: |
          set -euo pipefail

          # Windows: 转换反斜杠为正斜杠（tar 不支持反斜杠路径）
          RAW_WS="${{ github.workspace }}"
          case "${{ runner.os }}" in
            Windows) WS="${RAW_WS//\\//}" ;;
            *)       WS="$RAW_WS" ;;
          esac

          ENGINE_DIR="$WS/engine"
          OUTPUT_DIR="$ENGINE_DIR/portable-python"

          # 根据 runner OS 选择架构
          case "${{ runner.os }}" in
            macOS)
              case "$(uname -m)" in
                arm64)  PLATFORM="aarch64-apple-darwin" ;;
                x86_64) PLATFORM="x86_64-apple-darwin" ;;
                *) echo "Unknown arch: $(uname -m)"; exit 1 ;;
              esac
              ;;
            Windows)
              PLATFORM="x86_64-pc-windows-msvc"
              ;;
            *)
              echo "Unsupported OS: ${{ runner.os }}"
              exit 1
              ;;
          esac

          PYTHON_VERSION="3.12.13"
          RELEASE_TAG="20260623"
          FILENAME="cpython-${PYTHON_VERSION}+${RELEASE_TAG}-${PLATFORM}-install_only_stripped.tar.gz"
          DOWNLOAD_URL="https://github.com/astral-sh/python-build-standalone/releases/download/${RELEASE_TAG}/${FILENAME}"

          echo "🔍 Platform: $PLATFORM"
          echo "📥 Downloading $FILENAME ..."

          mkdir -p "$OUTPUT_DIR"
          curl -L --retry 3 --retry-delay 5 -o "/tmp/${FILENAME}" "$DOWNLOAD_URL"
          tar -xzf "/tmp/${FILENAME}" -C "$OUTPUT_DIR" --strip-components=1
          rm "/tmp/${FILENAME}"

          # 找到 Python
          if [ -f "$OUTPUT_DIR/bin/python3" ]; then
            PYTHON_BIN="$OUTPUT_DIR/bin/python3"
          elif [ -f "$OUTPUT_DIR/bin/python" ]; then
            PYTHON_BIN="$OUTPUT_DIR/bin/python"
          elif [ -f "$OUTPUT_DIR/python.exe" ]; then
            PYTHON_BIN="$OUTPUT_DIR/python.exe"
          else
            echo "❌ Python binary not found"; exit 1
          fi

          echo "🐍 $($PYTHON_BIN --version 2>&1)"

          # 升级 pip 并安装依赖
          "$PYTHON_BIN" -m pip install --upgrade pip --quiet
          "$PYTHON_BIN" -m pip install -r "$ENGINE_DIR/requirements.txt" --no-compile --quiet
          echo "✅ Dependencies installed"

          # 清理无用文件
          find "$OUTPUT_DIR" -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$OUTPUT_DIR" -name "*.pyc" -delete 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/var/cache" "$OUTPUT_DIR/.cache" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/lib/python3.12/test" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/lib/python3.12/idlelib" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/lib/python3.12/tkinter" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/lib/python3.12/turtledemo" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/lib/python3.12/unittest" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/lib/python3.12/ensurepip" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/include" 2>/dev/null || true

          echo "✅ Portable Python ready"
          du -sh "$OUTPUT_DIR"

      - name: Verify portable Python before build
        shell: bash
        run: |
          set -euo pipefail
          # 关键验证：在 build 之前确认 python 二进制真的存在，
          # 否则 build.rs 会 panic 中止构建。
          # 历史上曾发生过 portable-python 目录只有 .gitkeep 就被打包，
          # 导致用户安装后运行报 "Python not found"。
          if [ "${{ runner.os }}" = "Windows" ]; then
            PY_BIN="$GITHUB_WORKSPACE/engine/portable-python/python.exe"
          else
            PY_BIN="$GITHUB_WORKSPACE/engine/portable-python/bin/python3"
          fi

          if [ ! -f "$PY_BIN" ]; then
            echo "❌ FATAL: Python binary not found at: $PY_BIN"
            echo "    Directory contents:"
            ls -la "$GITHUB_WORKSPACE/engine/portable-python/" 2>/dev/null || echo "    (directory missing)"
            exit 1
          fi

          SIZE=$(stat -c%s "$PY_BIN" 2>/dev/null || stat -f%z "$PY_BIN")
          if [ "$SIZE" -lt 100000 ]; then
            echo "❌ FATAL: Python binary suspiciously small (${SIZE} bytes): $PY_BIN"
            exit 1
          fi

          echo "✅ Verified Python binary: $PY_BIN ($SIZE bytes)"
          "$PY_BIN" --version

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Verify bundle contains Python
        shell: bash
        run: |
          set -euo pipefail
          # 构建后验证：直接检查 NSIS 安装包大小。
          # 便携 Python 解压后约 50-100 MB，加上 Python 依赖（Pillow/numpy）后更大。
          # 如果 NSIS 安装包小于 30 MB，几乎可以确定 Python 没被打进去。
          # 这是 v0.4.8/v0.4.9 出现 "Python not found" 的根因——
          # CI 静默产出了不包含 Python 的安装包。
          echo "=== Bundle 目录树 ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null | head -20

          INSTALLER=$(find src-tauri/target/release/bundle -name "*.exe" -path "*nsis*" 2>/dev/null | head -1)
          if [ -z "$INSTALLER" ]; then
            INSTALLER=$(find src-tauri/target/release/bundle -name "*-setup.exe" 2>/dev/null | head -1)
          fi

          if [ -z "$INSTALLER" ]; then
            echo "⚠️  未找到 NSIS 安装包，跳过大小验证（可能是 macOS 构建）"
            exit 0
          fi

          SIZE=$(stat -c%s "$INSTALLER" 2>/dev/null || stat -f%z "$INSTALLER")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "📦 安装包: $INSTALLER"
          echo "📦 大小: ${SIZE_MB} MB"

          # 阈值 30 MB：Python 二进制本身约 30MB，加上 stdlib 和依赖远超此值
          if [ "$SIZE_MB" -lt 30 ]; then
            echo "❌ FATAL: 安装包体积过小 (${SIZE_MB} MB < 30 MB)"
            echo "    几乎可以确定便携 Python 没被打进安装包。"
            echo "    请检查 tauri.conf.json 的 resources glob 是否真的匹配到了"
            echo "    engine/portable-python/ 下的 python 二进制。"
            exit 1
          fi
          echo "✅ 安装包体积正常 (${SIZE_MB} MB ≥ 30 MB)，便携 Python 应已打包"

      - name: Upload bundle
        uses: actions/upload-artifact@v5
        with:
          name: bundle-${{ runner.os }}
          path: src-tauri/target/release/bundle/
          retention-days: 7

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v5

      - name: Download all bundles
        uses: actions/download-artifact@v5
        with:
          path: bundles

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bundles/**/*.dmg
            bundles/**/*.msi
            bundles/**/*.exe
          generate_release_notes: true
          make_latest: true
