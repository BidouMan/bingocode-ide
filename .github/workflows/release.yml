name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: '构建平台'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - macos
          - both

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: >-
          ${{
            github.event_name == 'workflow_dispatch' && (
              github.event.inputs.platform == 'windows' && fromJSON('["windows-latest"]') ||
              github.event.inputs.platform == 'macos' && fromJSON('["macos-latest"]') ||
              fromJSON('["macos-latest", "windows-latest"]')
            ) || fromJSON('["macos-latest", "windows-latest"]')
          }}

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: pnpm install

      - name: Setup portable Python engine
        shell: bash
        run: |
          set -euo pipefail

          # Windows: 转换反斜杠为正斜杠（tar 不支持反斜杠路径）
          RAW_WS="${{ github.workspace }}"
          case "${{ runner.os }}" in
            Windows) WS="${RAW_WS//\\//}" ;;
            *)       WS="$RAW_WS" ;;
          esac

          ENGINE_DIR="$WS/engine"
          OUTPUT_DIR="$ENGINE_DIR/portable-python"

          # 根据 runner OS 选择架构
          case "${{ runner.os }}" in
            macOS)
              case "$(uname -m)" in
                arm64)  PLATFORM="aarch64-apple-darwin" ;;
                x86_64) PLATFORM="x86_64-apple-darwin" ;;
                *) echo "Unknown arch: $(uname -m)"; exit 1 ;;
              esac
              ;;
            Windows)
              PLATFORM="x86_64-pc-windows-msvc"
              ;;
            *)
              echo "Unsupported OS: ${{ runner.os }}"
              exit 1
              ;;
          esac

          PYTHON_VERSION="3.12.13"
          RELEASE_TAG="20260623"
          FILENAME="cpython-${PYTHON_VERSION}+${RELEASE_TAG}-${PLATFORM}-install_only_stripped.tar.gz"
          DOWNLOAD_URL="https://github.com/astral-sh/python-build-standalone/releases/download/${RELEASE_TAG}/${FILENAME}"

          echo "🔍 Platform: $PLATFORM"
          echo "📥 Downloading $FILENAME ..."

          mkdir -p "$OUTPUT_DIR"
          curl -L --retry 3 --retry-delay 5 -o "/tmp/${FILENAME}" "$DOWNLOAD_URL"
          tar -xzf "/tmp/${FILENAME}" -C "$OUTPUT_DIR" --strip-components=1
          rm "/tmp/${FILENAME}"

          # 找到 Python
          if [ -f "$OUTPUT_DIR/bin/python3" ]; then
            PYTHON_BIN="$OUTPUT_DIR/bin/python3"
          elif [ -f "$OUTPUT_DIR/bin/python" ]; then
            PYTHON_BIN="$OUTPUT_DIR/bin/python"
          elif [ -f "$OUTPUT_DIR/python.exe" ]; then
            PYTHON_BIN="$OUTPUT_DIR/python.exe"
          else
            echo "❌ Python binary not found"; exit 1
          fi

          echo "🐍 $($PYTHON_BIN --version 2>&1)"

          # 升级 pip 并安装依赖
          "$PYTHON_BIN" -m pip install --upgrade pip --quiet
          "$PYTHON_BIN" -m pip install -r "$ENGINE_DIR/requirements.txt" --no-compile --quiet
          echo "✅ Dependencies installed"

          # 清理无用文件
          find "$OUTPUT_DIR" -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$OUTPUT_DIR" -name "*.pyc" -delete 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/var/cache" "$OUTPUT_DIR/.cache" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/lib/python3.12/test" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/lib/python3.12/idlelib" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/lib/python3.12/tkinter" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/lib/python3.12/turtledemo" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/lib/python3.12/unittest" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/lib/python3.12/ensurepip" 2>/dev/null || true
          rm -rf "$OUTPUT_DIR/include" 2>/dev/null || true

          echo "✅ Portable Python ready"
          du -sh "$OUTPUT_DIR"

      - name: Verify portable Python before build
        shell: bash
        run: |
          set -euo pipefail
          # 关键验证：在 build 之前确认 python 二进制真的可执行，
          # 否则 build.rs 会 panic 中止构建。
          # 历史上曾发生过 portable-python 目录只有 .gitkeep 就被打包，
          # 导致用户安装后运行报 "Python not found"。
          #
          # 注意：不能用文件大小判断——
          #   - macOS 上 bin/python3 是 symlink（指向 python3.12），symlink 本身只有几 bytes
          #   - Windows 上 python.exe 是 launcher stub（约 90KB），真正解释器在 python3.dll
          # 最可靠的方式是直接执行 --version 验证可运行性。
          if [ "${{ runner.os }}" = "Windows" ]; then
            PY_BIN="$GITHUB_WORKSPACE/engine/portable-python/python.exe"
          else
            PY_BIN="$GITHUB_WORKSPACE/engine/portable-python/bin/python3"
          fi

          if [ ! -e "$PY_BIN" ]; then
            echo "❌ FATAL: Python binary not found at: $PY_BIN"
            echo "    Directory contents:"
            ls -la "$GITHUB_WORKSPACE/engine/portable-python/" 2>/dev/null || echo "    (directory missing)"
            ls -la "$GITHUB_WORKSPACE/engine/portable-python/bin/" 2>/dev/null || true
            exit 1
          fi

          # 执行验证：能跑通就算数（比文件大小可靠）
          echo "🐍 Verifying Python at: $PY_BIN"
          VERSION_OUTPUT=$("$PY_BIN" --version 2>&1) || {
            echo "❌ FATAL: Python binary not executable: $PY_BIN"
            echo "    --version output: $VERSION_OUTPUT"
            exit 1
          }
          echo "✅ Python executable: $VERSION_OUTPUT"

          # 额外验证：确认能 import 关键依赖（Pillow/numpy）
          # 这些是 engine/requirements.txt 里要装的，setup 步骤应该已装好
          DEP_CHECK=$("$PY_BIN" -c "import PIL, numpy; print('deps OK')" 2>&1) || {
            echo "⚠️  WARNING: Python dependencies missing: $DEP_CHECK"
            echo "    Setup step should have installed Pillow + numpy."
            echo "    Continuing anyway (will fail at runtime if deps are truly missing)."
          }
          echo "✅ $DEP_CHECK"

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Verify bundle contains Python
        shell: bash
        run: |
          # 构建后验证：直接用 7z 列出 NSIS 安装包内容，确认 python.exe 真的在里面。
          # 不用 set -euo pipefail —— 7z 管道容易触发 SIGPIPE (exit 141)
          echo "=== Bundle 目录树 ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null | head -20

          INSTALLER=$(find src-tauri/target/release/bundle -name "*.exe" -path "*nsis*" 2>/dev/null | head -1)
          if [ -z "$INSTALLER" ]; then
            INSTALLER=$(find src-tauri/target/release/bundle -name "*-setup.exe" 2>/dev/null | head -1)
          fi

          if [ -z "$INSTALLER" ]; then
            echo "⚠️  未找到 NSIS 安装包，跳过验证（可能是 macOS 构建）"
            exit 0
          fi

          SIZE=$(stat -c%s "$INSTALLER" 2>/dev/null || stat -f%z "$INSTALLER")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "📦 安装包: $INSTALLER"
          echo "📦 大小: ${SIZE_MB} MB"

          # 用 7z 列出安装包内容到临时文件（避免管道 SIGPIPE）
          LIST_FILE=$(mktemp)
          7z l "$INSTALLER" > "$LIST_FILE" 2>&1 || true

          echo "=== 7z 列出文件总数 ==="
          wc -l "$LIST_FILE"

          # 检查 python.exe（Windows）或 bin/python3（macOS）是否在安装包中
          # NSIS 安装包中路径可能是 _up_\engine\portable-python\python.exe 这种格式
          if [ "${{ runner.os }}" = "Windows" ]; then
            PY_PATTERN="python\.exe"
          else
            PY_PATTERN="bin/python3"
          fi

          echo "=== 搜索 Python 二进制 ($PY_PATTERN) ==="
          PY_MATCHES=$(grep -iE "$PY_PATTERN" "$LIST_FILE" || true)

          if [ -z "$PY_MATCHES" ]; then
            echo "❌ FATAL: 安装包中没有 Python 二进制 (匹配: $PY_PATTERN)"
            echo "    === 7z 输出中包含 'python' 的行（前 20 行）==="
            grep -i "python" "$LIST_FILE" | head -20 || echo "    (无)"
            echo "    === 7z 输出前 30 行 ==="
            head -30 "$LIST_FILE"
            rm -f "$LIST_FILE"
            exit 1
          fi

          echo "✅ 安装包中找到 Python 二进制："
          echo "$PY_MATCHES" | head -5
          rm -f "$LIST_FILE"
          echo "✅ Python 二进制确认在安装包中"

      - name: Upload bundle
        uses: actions/upload-artifact@v5
        with:
          name: bundle-${{ runner.os }}
          path: src-tauri/target/release/bundle/
          retention-days: 7

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v5

      - name: Download all bundles
        uses: actions/download-artifact@v5
        with:
          path: bundles

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bundles/**/*.dmg
            bundles/**/*.msi
            bundles/**/*.exe
          generate_release_notes: true
          make_latest: true
